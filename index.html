<!DOCTYPE html>
<html lang="en">
<head></head>
<meta charset="UTF-8">
<title></title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="mySidenav" class="sidenav">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
  <a href="index.html">Home</a>
  <a href="profile.html">Profile</a>
  <a href="class.html">Classes</a>
  <a href="settings.html">Settings</a>
</div>

<span class="burger" onclick="openNav()">☰</span>

<div id="main">
  <h1>user's dahsboard</h1>

  <div class="timer">
  <h3>Timer</h3>

  <select id="mode">
    <option value="">Select mode</option>
    <option value="pomodoro">Pomodoro</option>
    <option value="custom">Custom</option>
  </select>

  <div id="customInputs" style="display:none;">
    <input type="number" id="studyTime" placeholder="Study (min)">
    <input type="number" id="breakTime" placeholder="Break (min)">
  </div>

  <div id="timeDisplay">00:00</div>

  <div id="controls" style="display:none;">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="stopTimer()">Stop</button>
  </div>
</div>

 <div class="todo-box">
    <h3>To do list</h3>

    <div class="todo-input">
      <input type="text" id="taskInput" placeholder="Add task">
      <button id="addBtn">+</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <div class="playlist">
  <h3>My Playlist</h3>
  <input type="text" id="linkInput" placeholder="Paste playlist link">
  <button onclick="loadPlaylist()">Load</button>

  <div id="player"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
